[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

; Force the CPU to 160MHz
board_build.f_cpu = 160000000L

; Set the Serial Monitor speed to match your code
monitor_speed = 115200

; (Optional) If you were using any external libraries, you'd list them here:
; lib_deps = 
;    Some Library Name @ ^1.2.3
